<!DOCTYPE html>
<html>
<head>
    <title>Financial Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>AI Financial Health Monitor</h2>
    <p class="subtitle">Track your income, expenses & financial patterns</p>

    <form method="POST" action="/add">

        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required>
        </div>

        <div class="form-group">
            <label>Type</label>
            <select name="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" placeholder="e.g. Food, Rent" required>
        </div>

        <div class="form-group">
            <label>Amount</label>
            <input type="number" step="0.01" name="amount" required>
        </div>

        <button type="submit">Add Transaction</button>
    </form>

    <a class="link-btn" href="/dashboard">View Dashboard</a>
</div>

</body>
</html>
